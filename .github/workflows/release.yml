name: Release

# Obsidian's community-plugin installer requires the release tag to EXACTLY
# match manifest.json's version — no "v" prefix. Tag releases as e.g. "0.1.12".
on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]

# id-token + attestations let attest-build-provenance sign the release assets
# so users (and Obsidian's review tooling) can verify they were built here.
permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches manifest.json version
        run: |
          set -e
          MANIFEST_VER="$(node -p "require('./manifest.json').version")"
          if [ "$GITHUB_REF_NAME" != "$MANIFEST_VER" ]; then
            echo "FAIL: tag '$GITHUB_REF_NAME' != manifest.json version '$MANIFEST_VER'."
            echo "Obsidian requires them to match exactly (no v prefix). Run 'npm version' before tagging."
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
      - name: Build release notes from CHANGELOG.md
        run: |
          set -e
          VER="${GITHUB_REF_NAME}"
          # Print the section for this version (between "## [VER]" and the next "## [").
          awk -v ver="$VER" '
            $0 ~ ("^## \\[" ver "\\]") { grab=1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > notes.md
          # Always append the manual-install instructions (also the fallback body
          # when the changelog has no matching section).
          {
            printf '\n---\n\n'
            printf '**Manual install:** download **`main.js`**, **`manifest.json`**, and **`styles.css`** below — ⚠️ **not** "Source code (zip)", which has no built `main.js` and will fail to load. Put them in `<your-vault>/.obsidian/plugins/uru/`, then enable Uru in Settings → Community plugins. First run downloads the local backend (~3 GB) — see the setup dialog.\n'
          } >> notes.md
          echo '----- release notes -----'; cat notes.md
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # Exactly the three files Obsidian's installer fetches — the Python
          # sidecar is embedded inside main.js (scripts/sidecar-embed.mjs), and
          # extra assets get flagged by the plugin review as unsupported files.
          files: |
            main.js
            manifest.json
            styles.css
          body_path: notes.md
