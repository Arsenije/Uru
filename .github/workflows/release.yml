name: Release

# Obsidian's community-plugin installer requires the release tag to EXACTLY
# match manifest.json's version — no "v" prefix. Tag releases as e.g. "0.1.11".
on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches manifest.json version
        run: |
          set -e
          MANIFEST_VER="$(node -p "require('./manifest.json').version")"
          if [ "$GITHUB_REF_NAME" != "$MANIFEST_VER" ]; then
            echo "FAIL: tag '$GITHUB_REF_NAME' != manifest.json version '$MANIFEST_VER'."
            echo "Obsidian requires them to match exactly (no v prefix). Run 'npm version' before tagging."
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Stage plugin bundle
        run: |
          set -e
          # The Python sidecar is embedded inside main.js (scripts/sidecar-embed.mjs),
          # so the plugin is exactly the three files Obsidian's installer fetches.
          mkdir -p dist/uru
          cp main.js manifest.json styles.css dist/uru/
          cp scripts/verify-staging.mjs dist/uru/
          (cd dist && zip -r "uru-${GITHUB_REF_NAME}.zip" uru)
          ls -la dist
      - name: Build release notes from CHANGELOG.md
        run: |
          set -e
          VER="${GITHUB_REF_NAME}"
          # Print the section for this version (between "## [VER]" and the next "## [").
          awk -v ver="$VER" '
            $0 ~ ("^## \\[" ver "\\]") { grab=1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > notes.md
          # Always append the manual-install instructions (also the fallback body
          # when the changelog has no matching section).
          {
            printf '\n---\n\n'
            printf '**Manual install:** download the **`uru-%s.zip`** asset below — ⚠️ **not** "Source code (zip)", which has no built `main.js` and will fail to load. Extract the `uru/` folder into `<your-vault>/.obsidian/plugins/`, then enable Uru in Settings → Community plugins. First run downloads the local backend (~3 GB) — see the setup dialog.\n' "$GITHUB_REF_NAME"
          } >> notes.md
          echo '----- release notes -----'; cat notes.md
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # main.js, manifest.json, and styles.css must be attached as individual
          # assets — Obsidian's installer downloads those exact files, never the zip.
          files: |
            main.js
            manifest.json
            styles.css
            dist/uru-*.zip
          body_path: notes.md
